<svg width="680" height="360" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Facade pattern structure</title>
  <desc>Client calls the Facade, which internally orchestrates multiple subsystem components: OrderValidator, InventoryService, PaymentGateway, WarehouseService, and EmailService.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Client box -->
  <rect x="30" y="130" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="95" y="152" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Client</text>
  <text x="95" y="171" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">calls one method</text>

  <!-- Arrow: client -> facade -->
  <line x1="161" y1="158" x2="218" y2="158" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Facade box -->
  <rect x="220" y="100" width="150" height="116" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="295" y="126" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">OrderFacade</text>
  <line x1="230" y1="136" x2="360" y2="136" stroke="#0F6E56" stroke-width="0.5" opacity="0.4"/>
  <text x="295" y="155" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">place_order()</text>
  <text x="295" y="174" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">cancel_order()</text>
  <text x="295" y="193" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">refund_order()</text>

  <!-- Subsystem bounding dashed rect -->
  <rect x="400" y="30" width="240" height="300" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="5 4"/>
  <text x="520" y="52" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888780">subsystem</text>

  <!-- Arrows: facade -> subsystem (5 lines fanning out) -->
  <line x1="370" y1="130" x2="418" y2="90"  stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow-teal)"/>
  <line x1="370" y1="143" x2="418" y2="148" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow-teal)"/>
  <line x1="370" y1="158" x2="418" y2="206" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow-teal)"/>
  <line x1="370" y1="171" x2="418" y2="264" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow-teal)"/>
  <line x1="370" y1="184" x2="418" y2="322" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow-teal)"/>

  <!-- Subsystem component boxes -->
  <rect x="420" y="64"  width="188" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="514" y="91"  text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">OrderValidator</text>

  <rect x="420" y="122" width="188" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="514" y="149" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">InventoryService</text>

  <rect x="420" y="180" width="188" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="514" y="207" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">PaymentGateway</text>

  <rect x="420" y="238" width="188" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="514" y="265" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">WarehouseService</text>

  <rect x="420" y="296" width="188" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="514" y="323" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">EmailService</text>
</svg>
