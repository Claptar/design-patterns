<svg width="680" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Bridge pattern structure</title>
  <desc>Two parallel hierarchies: Notification (abstraction) on the left, Sender (implementor) on the right, connected by a bridge reference arrow. Shows how M+N classes replace M×N classes.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: system-ui, sans-serif; }
      .label-sm { font-size: 12px; fill: #5f5e5a; }
      .label-md { font-size: 14px; fill: #2c2c2a; }
      .label-md-bold { font-size: 14px; font-weight: 500; fill: #2c2c2a; }
      .label-muted { font-size: 12px; fill: #888780; }

      .box-purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
      .text-purple-title { font-size: 14px; font-weight: 500; fill: #3C3489; }
      .text-purple-sub   { font-size: 12px; fill: #534AB7; }

      .box-teal { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
      .text-teal-title { font-size: 14px; font-weight: 500; fill: #085041; }
      .text-teal-sub   { font-size: 12px; fill: #0F6E56; }

      .box-note { fill: none; stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; }
      .inherit  { stroke: #888780; stroke-width: 0.5; fill: none; }
      .bridge   { stroke: #7F77DD; stroke-width: 1.5; stroke-dasharray: 6 3; fill: none; }
      .bridge-label { font-size: 12px; fill: #534AB7; font-weight: 500; }
      .bridge-sub   { font-size: 11px; fill: #888780; }

      @media (prefers-color-scheme: dark) {
        .label-sm   { fill: #b4b2a9; }
        .label-md   { fill: #d3d1c7; }
        .label-md-bold { fill: #d3d1c7; }
        .label-muted { fill: #5f5e5a; }

        .box-purple { fill: #3C3489; stroke: #AFA9EC; }
        .text-purple-title { fill: #CECBF6; }
        .text-purple-sub   { fill: #AFA9EC; }

        .box-teal { fill: #085041; stroke: #5DCAA5; }
        .text-teal-title { fill: #9FE1CB; }
        .text-teal-sub   { fill: #5DCAA5; }

        .inherit { stroke: #5f5e5a; }
        .bridge  { stroke: #AFA9EC; }
        .bridge-label { fill: #AFA9EC; }
        .bridge-sub   { fill: #5f5e5a; }
        .box-note { stroke: #444441; }
      }
    </style>
  </defs>

  <!-- Column headers -->
  <text class="label-sm" x="170" y="26" text-anchor="middle">Abstraction hierarchy</text>
  <text class="label-sm" x="510" y="26" text-anchor="middle">Implementor hierarchy</text>

  <!-- ── Abstraction side ── -->

  <!-- Notification base -->
  <rect class="box-purple" x="60" y="44" width="220" height="56" rx="8"/>
  <text class="text-purple-title" x="170" y="68" text-anchor="middle" dominant-baseline="central">Notification</text>
  <text class="text-purple-sub"  x="170" y="86" text-anchor="middle" dominant-baseline="central">send(message)</text>

  <!-- LowPriorityNotification -->
  <rect class="box-purple" x="30" y="170" width="160" height="56" rx="8"/>
  <text class="text-purple-title" x="110" y="192" text-anchor="middle" dominant-baseline="central">LowPriority</text>
  <text class="text-purple-sub"  x="110" y="210" text-anchor="middle" dominant-baseline="central">batches messages</text>

  <!-- HighPriorityNotification -->
  <rect class="box-purple" x="210" y="170" width="160" height="56" rx="8"/>
  <text class="text-purple-title" x="290" y="192" text-anchor="middle" dominant-baseline="central">HighPriority</text>
  <text class="text-purple-sub"  x="290" y="210" text-anchor="middle" dominant-baseline="central">sends immediately</text>

  <!-- Inheritance arrows (abstraction) -->
  <line class="inherit" x1="110" y1="170" x2="150" y2="100" marker-end="url(#arrow)"/>
  <line class="inherit" x1="290" y1="170" x2="210" y2="100" marker-end="url(#arrow)"/>

  <!-- ── Implementor side ── -->

  <!-- Sender base -->
  <rect class="box-teal" x="400" y="44" width="220" height="56" rx="8"/>
  <text class="text-teal-title" x="510" y="68" text-anchor="middle" dominant-baseline="central">Sender</text>
  <text class="text-teal-sub"  x="510" y="86" text-anchor="middle" dominant-baseline="central">deliver(recipient, body)</text>

  <!-- EmailSender -->
  <rect class="box-teal" x="374" y="170" width="120" height="56" rx="8"/>
  <text class="text-teal-title" x="434" y="192" text-anchor="middle" dominant-baseline="central">EmailSender</text>
  <text class="text-teal-sub"  x="434" y="210" text-anchor="middle" dominant-baseline="central">via SMTP</text>

  <!-- SmsSender -->
  <rect class="box-teal" x="504" y="170" width="120" height="56" rx="8"/>
  <text class="text-teal-title" x="564" y="192" text-anchor="middle" dominant-baseline="central">SmsSender</text>
  <text class="text-teal-sub"  x="564" y="210" text-anchor="middle" dominant-baseline="central">via Twilio</text>

  <!-- Inheritance arrows (implementor) -->
  <line class="inherit" x1="434" y1="170" x2="490" y2="100" marker-end="url(#arrow)"/>
  <line class="inherit" x1="564" y1="170" x2="540" y2="100" marker-end="url(#arrow)"/>

  <!-- ── Bridge reference ── -->
  <path class="bridge" d="M280 70 L398 70" marker-end="url(#arrow)"/>
  <text class="bridge-label" x="340" y="58" text-anchor="middle">bridge</text>
  <text class="bridge-sub"   x="340" y="84" text-anchor="middle">holds a reference</text>

  <!-- ── Bottom note ── -->
  <rect class="box-note" x="60" y="308" width="560" height="82" rx="8"/>
  <text class="label-muted" x="340" y="332" text-anchor="middle">Without Bridge: M×N classes — 2 priorities × 3 channels = 6 classes, grows multiplicatively</text>
  <text class="label-muted" x="340" y="354" text-anchor="middle">With Bridge: M+N classes — 2 priorities + 3 channels = 5 classes, grows additively</text>
  <text class="label-muted" x="340" y="376" text-anchor="middle">Add a new channel → 1 new class.  Add a new priority → 1 new class.</text>
</svg>
