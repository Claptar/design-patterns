<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Flyweight pattern structure</title>
  <desc>Three TreeContext objects on the left each hold unique extrinsic state (x, y, age). They all share a reference to one of two TreeFlyweight objects on the right — OakFlyweight or PineFlyweight — which hold shared intrinsic state like texture and mesh. A FlyweightFactory sits above the flyweights and manages them.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    text { font-family: sans-serif; }
    .th { font-size: 14px; font-weight: 500; fill: #444441; }
    .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .label { font-size: 12px; font-weight: 500; fill: #5F5E5A; }
    .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Section labels -->
  <text class="label" x="130" y="26" text-anchor="middle">Extrinsic state (unique)</text>
  <text class="label" x="540" y="26" text-anchor="middle">Intrinsic state (shared)</text>

  <!-- Context boxes (gray) -->
  <rect x="40" y="50" width="180" height="72" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th" x="130" y="80" text-anchor="middle">TreeContext</text>
  <text class="ts" x="130" y="100" text-anchor="middle">x=120, y=340, age=12</text>

  <rect x="40" y="160" width="180" height="72" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th" x="130" y="190" text-anchor="middle">TreeContext</text>
  <text class="ts" x="130" y="210" text-anchor="middle">x=440, y=80, age=47</text>

  <rect x="40" y="270" width="180" height="72" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th" x="130" y="300" text-anchor="middle">TreeContext</text>
  <text class="ts" x="130" y="320" text-anchor="middle">x=200, y=600, age=3</text>

  <!-- Factory box (purple) -->
  <rect x="440" y="30" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="540" y="54" text-anchor="middle" style="fill: #3C3489;">FlyweightFactory</text>
  <text class="ts" x="540" y="72" text-anchor="middle" style="fill: #534AB7;">Cache of flyweights</text>

  <!-- Flyweight boxes (teal) -->
  <rect x="440" y="140" width="200" height="76" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="540" y="165" text-anchor="middle" style="fill: #085041;">OakFlyweight</text>
  <text class="ts" x="540" y="185" text-anchor="middle" style="fill: #0F6E56;">texture, mesh, bark colour</text>
  <text class="ts" x="540" y="203" text-anchor="middle" style="fill: #0F6E56;">(shared by all oaks)</text>

  <rect x="440" y="268" width="200" height="76" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="540" y="293" text-anchor="middle" style="fill: #085041;">PineFlyweight</text>
  <text class="ts" x="540" y="313" text-anchor="middle" style="fill: #0F6E56;">texture, mesh, needle colour</text>
  <text class="ts" x="540" y="331" text-anchor="middle" style="fill: #0F6E56;">(shared by all pines)</text>

  <!-- Factory → flyweight dashed arrow -->
  <line x1="540" y1="86" x2="540" y2="138" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>

  <!-- Context → flyweight arrows -->
  <line x1="220" y1="86" x2="438" y2="172" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="220" y1="196" x2="438" y2="196" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="220" y1="306" x2="438" y2="306" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow labels -->
  <text class="ts" x="328" y="122" text-anchor="middle">oak</text>
  <text class="ts" x="328" y="190" text-anchor="middle">oak</text>
  <text class="ts" x="328" y="300" text-anchor="middle">pine</text>

  <!-- Memory summary note -->
  <rect x="40" y="375" width="600" height="32" rx="6" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>
  <text class="ts" x="340" y="395" text-anchor="middle">2 flyweight objects hold the heavy data · 3 (or 100,000) context objects hold only numbers</text>
</svg>
