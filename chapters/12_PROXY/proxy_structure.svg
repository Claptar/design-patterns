<svg width="680" height="310" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Proxy pattern structure</title>
  <desc>Client calls the Subject interface. Both Proxy and Real Subject implement Subject. Proxy optionally forwards to Real Subject.</desc>

  <defs>
    <!-- Solid arrowhead: calls / forwards -->
    <marker id="arr-solid" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- Dashed arrowhead: implements -->
    <marker id="arr-dashed" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- Open arrowhead: optional forward -->
    <marker id="arr-optional" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── Subject (top centre) ── -->
  <rect x="240" y="24" width="200" height="60" rx="8"
        fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="50" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">Subject</text>
  <text x="340" y="68" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="12" fill="#5F5E5A">shared interface</text>

  <!-- ── Client (bottom-left) ── -->
  <rect x="40" y="180" width="140" height="60" rx="8"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="110" y="206" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Client</text>
  <text x="110" y="224" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="12" fill="#0F6E56">holds Subject ref</text>

  <!-- ── Proxy (bottom-centre) ── -->
  <rect x="240" y="180" width="200" height="60" rx="8"
        fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="206" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Proxy</text>
  <text x="340" y="224" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="12" fill="#534AB7">controls access</text>

  <!-- ── Real Subject (bottom-right) ── -->
  <rect x="500" y="180" width="140" height="60" rx="8"
        fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="570" y="204" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Real Subject</text>
  <text x="570" y="222" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="12" fill="#993C1D">does the work</text>

  <!-- ── Proxy implements Subject (dashed, upward) ── -->
  <line x1="340" y1="180" x2="340" y2="86"
        stroke="#888780" stroke-width="1.2" stroke-dasharray="5 3"
        marker-end="url(#arr-dashed)"/>

  <!-- ── Real Subject implements Subject (dashed, diagonal) ── -->
  <path d="M 500 185 Q 460 120 440 84" fill="none"
        stroke="#888780" stroke-width="1.2" stroke-dasharray="5 3"
        marker-end="url(#arr-dashed)"/>

  <!-- ── Client calls Proxy (solid) ── -->
  <line x1="180" y1="210" x2="238" y2="210"
        stroke="#444441" stroke-width="1.5"
        marker-end="url(#arr-solid)"/>

  <!-- ── Proxy optionally forwards to Real Subject (dotted, lighter) ── -->
  <line x1="440" y1="210" x2="498" y2="210"
        stroke="#888780" stroke-width="1.2" stroke-dasharray="3 4"
        marker-end="url(#arr-optional)"/>

  <!-- ── Legend ── -->
  <line x1="40" y1="268" x2="72" y2="268"
        stroke="#444441" stroke-width="1.5" marker-end="url(#arr-solid)"/>
  <text x="78" y="272" font-family="sans-serif" font-size="12" fill="#5F5E5A">calls</text>

  <line x1="140" y1="268" x2="172" y2="268"
        stroke="#888780" stroke-width="1.2" stroke-dasharray="5 3"
        marker-end="url(#arr-dashed)"/>
  <text x="178" y="272" font-family="sans-serif" font-size="12" fill="#5F5E5A">implements</text>

  <line x1="290" y1="268" x2="322" y2="268"
        stroke="#888780" stroke-width="1.2" stroke-dasharray="3 4"
        marker-end="url(#arr-optional)"/>
  <text x="328" y="272" font-family="sans-serif" font-size="12" fill="#5F5E5A">optional forward</text>
</svg>
