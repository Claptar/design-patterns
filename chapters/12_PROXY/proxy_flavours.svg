<svg width="680" height="290" viewBox="0 0 680 290" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Proxy pattern flavours</title>
  <desc>Four proxy types arranged in a grid: Virtual (delays creation), Protection (checks permissions), Caching (stores results), Logging (records calls).</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── Heading ── -->
  <text x="340" y="26" text-anchor="middle"
        font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">Proxy flavours</text>

  <!-- Row 1 left: Virtual proxy -->
  <rect x="40" y="46" width="290" height="98" rx="8"
        fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="185" y="68" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Virtual proxy</text>
  <text x="185" y="86" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="12" fill="#534AB7">Delays creating the real object</text>
  <text x="185" y="104" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="12" fill="#3C3489">until it is actually needed</text>
  <text x="185" y="122" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="12" fill="#534AB7">e.g. lazy-loaded documents, ORM relations</text>

  <!-- Row 1 right: Protection proxy -->
  <rect x="350" y="46" width="290" height="98" rx="8"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="495" y="68" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Protection proxy</text>
  <text x="495" y="86" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="12" fill="#0F6E56">Checks permissions before</text>
  <text x="495" y="104" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="12" fill="#085041">forwarding the call</text>
  <text x="495" y="122" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="12" fill="#0F6E56">e.g. role-based access control</text>

  <!-- Row 2 left: Caching proxy -->
  <rect x="40" y="162" width="290" height="98" rx="8"
        fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="185" y="184" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="14" font-weight="500" fill="#412402">Caching proxy</text>
  <text x="185" y="202" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="12" fill="#854F0B">Stores results and short-circuits</text>
  <text x="185" y="220" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="12" fill="#633806">the real call on a cache hit</text>
  <text x="185" y="238" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="12" fill="#854F0B">e.g. weather API, report generation</text>

  <!-- Row 2 right: Logging proxy -->
  <rect x="350" y="162" width="290" height="98" rx="8"
        fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="495" y="184" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Logging proxy</text>
  <text x="495" y="202" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="12" fill="#5F5E5A">Records every call for</text>
  <text x="495" y="220" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="12" fill="#444441">auditing or debugging</text>
  <text x="495" y="238" text-anchor="middle" dominant-baseline="central"
        font-family="sans-serif" font-size="12" fill="#5F5E5A">e.g. payroll audit trail</text>
</svg>
