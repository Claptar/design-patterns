<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="12">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>

  <rect width="760" height="300" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="380" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Command History: execute / undo / redo</text>

  <!-- ── HISTORY STACK ── -->
  <text x="180" y="56" text-anchor="middle" font-weight="bold" fill="#333">history stack</text>

  <!-- Stack frames (bottom to top = left to right visually) -->
  <!-- cmd1 -->
  <rect x="60" y="68" width="100" height="44" rx="5" fill="#e8f4fd" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="110" y="88" text-anchor="middle" font-weight="bold" fill="#1a3a5c">Insert</text>
  <text x="110" y="104" text-anchor="middle" fill="#444" font-size="10">"Hello", 0</text>

  <!-- cmd2 -->
  <rect x="170" y="68" width="100" height="44" rx="5" fill="#e8f4fd" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="220" y="88" text-anchor="middle" font-weight="bold" fill="#1a3a5c">Insert</text>
  <text x="220" y="104" text-anchor="middle" fill="#444" font-size="10">" World", 5</text>

  <!-- cmd3 -->
  <rect x="280" y="68" width="100" height="44" rx="5" fill="#e8f4fd" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="330" y="88" text-anchor="middle" font-weight="bold" fill="#1a3a5c">Delete</text>
  <text x="330" y="104" text-anchor="middle" fill="#444" font-size="10">pos=5, len=6</text>

  <!-- top of stack arrow -->
  <text x="330" y="60" text-anchor="middle" fill="#888" font-size="10">← top</text>

  <!-- ── REDO STACK ── -->
  <text x="530" y="56" text-anchor="middle" font-weight="bold" fill="#333">redo stack</text>

  <!-- redo slot (empty initially, show as ghost) -->
  <rect x="480" y="68" width="100" height="44" rx="5" fill="#f9f9f9" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="530" y="94" text-anchor="middle" fill="#bbb" font-size="11">(empty)</text>

  <!-- ── DOCUMENT STATE ── -->
  <text x="380" y="165" text-anchor="middle" font-weight="bold" fill="#333">document.content after each step</text>

  <rect x="30" y="178" width="700" height="34" rx="5" fill="#fff" stroke="#ccc" stroke-width="1"/>

  <!-- Step labels -->
  <text x="60" y="173" text-anchor="middle" fill="#888" font-size="10">step 0</text>
  <text x="185" y="173" text-anchor="middle" fill="#888" font-size="10">step 1 execute</text>
  <text x="310" y="173" text-anchor="middle" fill="#888" font-size="10">step 2 execute</text>
  <text x="435" y="173" text-anchor="middle" fill="#888" font-size="10">step 3 execute</text>
  <text x="560" y="173" text-anchor="middle" fill="#c0392b" font-size="10">step 4 undo</text>
  <text x="680" y="173" text-anchor="middle" fill="#27ae60" font-size="10">step 5 redo</text>

  <!-- Dividers -->
  <line x1="155" y1="178" x2="155" y2="212" stroke="#ddd" stroke-width="1"/>
  <line x1="280" y1="178" x2="280" y2="212" stroke="#ddd" stroke-width="1"/>
  <line x1="405" y1="178" x2="405" y2="212" stroke="#ddd" stroke-width="1"/>
  <line x1="530" y1="178" x2="530" y2="212" stroke="#ddd" stroke-width="1"/>
  <line x1="620" y1="178" x2="620" y2="212" stroke="#ddd" stroke-width="1"/>

  <text x="92" y="200" text-anchor="middle" fill="#aaa" font-size="11">""</text>
  <text x="217" y="200" text-anchor="middle" fill="#333" font-size="11">"Hello"</text>
  <text x="342" y="200" text-anchor="middle" fill="#333" font-size="11">"Hello World"</text>
  <text x="467" y="200" text-anchor="middle" fill="#333" font-size="11">"Hello"</text>
  <text x="575" y="200" text-anchor="middle" fill="#c0392b" font-size="11">"Hello"</text>
  <text x="690" y="200" text-anchor="middle" fill="#27ae60" font-size="11">"Hello World"</text>

  <!-- ── FLOW ARROWS ── -->
  <!-- execute arrows (grey, downward from stack to doc) -->
  <line x1="110" y1="112" x2="110" y2="176" stroke="#5b9bd5" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4,3"/>
  <line x1="220" y1="112" x2="220" y2="176" stroke="#5b9bd5" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4,3"/>
  <line x1="330" y1="112" x2="330" y2="176" stroke="#5b9bd5" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4,3"/>

  <!-- undo arrow: from history top back up -->
  <path d="M 330 68 Q 330 38 480 38 Q 530 38 530 68" stroke="#c0392b" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <text x="430" y="30" text-anchor="middle" fill="#c0392b" font-size="10">undo() pops → pushes to redo</text>

  <!-- redo arrow -->
  <path d="M 480 68 Q 480 38 620 38" stroke="#27ae60" stroke-width="1.5" fill="none" marker-end="url(#arr-green)" stroke-dasharray="5,3"/>
  <text x="560" y="56" text-anchor="middle" fill="#27ae60" font-size="10">redo() re-executes</text>

  <!-- ── RULE CALLOUTS ── -->
  <rect x="30" y="228" width="700" height="56" rx="6" fill="#fffbe6" stroke="#f0c040" stroke-width="1.2"/>
  <text x="45" y="248" fill="#7a5800" font-size="11" font-weight="bold">Key rules</text>
  <text x="45" y="264" fill="#555" font-size="11">• execute() → append to history, clear redo stack</text>
  <text x="45" y="279" fill="#555" font-size="11">• undo()    → pop from history → call cmd.undo() → push to redo stack</text>
  <text x="380" y="264" fill="#555" font-size="11">• redo()    → pop from redo stack → call cmd.execute() → push to history</text>
  <text x="380" y="279" fill="#555" font-size="11">• new execute() always clears the redo stack (no branching history)</text>
</svg>
