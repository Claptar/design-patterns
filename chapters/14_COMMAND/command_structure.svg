<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-open" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="none" stroke="#555" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="340" fill="#fafafa" rx="8"/>

  <!-- ── CLIENT ── -->
  <rect x="20" y="130" width="110" height="50" rx="6" fill="#e8f4fd" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="75" y="152" text-anchor="middle" font-weight="bold" fill="#1a3a5c">Client</text>
  <text x="75" y="169" text-anchor="middle" fill="#444" font-size="11">creates &amp; wires</text>

  <!-- ── INVOKER ── -->
  <rect x="195" y="20" width="160" height="80" rx="6" fill="#eef6ee" stroke="#5a9a5a" stroke-width="1.5"/>
  <text x="275" y="44" text-anchor="middle" font-weight="bold" fill="#1a3a1a">Invoker</text>
  <line x1="195" y1="54" x2="355" y2="54" stroke="#5a9a5a" stroke-width="1"/>
  <text x="275" y="70" text-anchor="middle" fill="#333" font-size="11">history: list[Command]</text>
  <text x="275" y="86" text-anchor="middle" fill="#333" font-size="11">execute(cmd) / undo()</text>

  <!-- ── COMMAND (interface) ── -->
  <rect x="195" y="155" width="160" height="80" rx="6" fill="#fdf3e3" stroke="#d4a017" stroke-width="1.5"/>
  <text x="275" y="175" text-anchor="middle" font-style="italic" fill="#7a5800" font-size="11">«interface»</text>
  <text x="275" y="191" text-anchor="middle" font-weight="bold" fill="#3a2800">Command</text>
  <line x1="195" y1="198" x2="355" y2="198" stroke="#d4a017" stroke-width="1"/>
  <text x="275" y="215" text-anchor="middle" fill="#333" font-size="11">execute() → None</text>
  <text x="275" y="231" text-anchor="middle" fill="#333" font-size="11">undo() → None</text>

  <!-- ── CONCRETE COMMANDS ── -->
  <rect x="195" y="285" width="160" height="42" rx="6" fill="#fdf3e3" stroke="#d4a017" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="275" y="302" text-anchor="middle" font-weight="bold" fill="#3a2800">InsertCommand</text>
  <text x="275" y="318" text-anchor="middle" fill="#666" font-size="11">execute() / undo()</text>

  <!-- ── RECEIVER ── -->
  <rect x="510" y="155" width="160" height="80" rx="6" fill="#f3e8fd" stroke="#8b5bd5" stroke-width="1.5"/>
  <text x="590" y="179" text-anchor="middle" font-weight="bold" fill="#2a0060">Receiver</text>
  <line x1="510" y1="186" x2="670" y2="186" stroke="#8b5bd5" stroke-width="1"/>
  <text x="590" y="202" text-anchor="middle" fill="#333" font-size="11">insert(text, pos)</text>
  <text x="590" y="218" text-anchor="middle" fill="#333" font-size="11">delete(pos, len)</text>
  <text x="590" y="234" text-anchor="middle" fill="#444" font-size="10" font-style="italic">knows nothing about history</text>

  <!-- ── ARROWS ── -->

  <!-- Client → Invoker: creates commands, calls execute -->
  <line x1="130" y1="145" x2="193" y2="58" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="148" y="96" fill="#555" font-size="10" transform="rotate(-35,148,96)">creates &amp; submits</text>

  <!-- Client → ConcreteCommand: creates -->
  <line x1="130" y1="165" x2="193" y2="300" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)" stroke-dasharray="5,3"/>

  <!-- Invoker → Command interface: stores -->
  <line x1="275" y1="100" x2="275" y2="153" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="282" y="133" fill="#555" font-size="10">stores &amp; calls</text>

  <!-- ConcreteCommand → Command interface: implements (open arrow) -->
  <line x1="275" y1="285" x2="275" y2="237" stroke="#555" stroke-width="1.4" marker-end="url(#arrow-open)"/>
  <text x="282" y="265" fill="#555" font-size="10">implements</text>

  <!-- ConcreteCommand → Receiver: uses -->
  <path d="M355 306 Q440 306 510 210" stroke="#555" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>
  <text x="430" y="295" fill="#555" font-size="10">uses</text>

  <!-- Legend -->
  <text x="20" y="325" fill="#999" font-size="10">- - -  dashed = concrete implementations</text>
  <line x1="430" y1="322" x2="450" y2="322" stroke="#555" stroke-width="1.4" stroke-dasharray="5,3"/>
  <polygon points="450,319 460,322 450,325" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="465" y="325" fill="#999" font-size="10">open arrow = implements</text>
</svg>
