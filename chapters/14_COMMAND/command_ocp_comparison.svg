<svg viewBox="0 0 760 310" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="12">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>

  <rect width="760" height="310" fill="#fafafa" rx="8"/>

  <!-- ══ LEFT SIDE: WITHOUT COMMAND ══ -->
  <text x="185" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">Without Command  ✗</text>

  <!-- Callers -->
  <rect x="20" y="36" width="110" height="34" rx="5" fill="#fde8e8" stroke="#c0392b" stroke-width="1.5"/>
  <text x="75" y="58" text-anchor="middle" fill="#7a0000">Toolbar button</text>

  <rect x="20" y="82" width="110" height="34" rx="5" fill="#fde8e8" stroke="#c0392b" stroke-width="1.5"/>
  <text x="75" y="104" text-anchor="middle" fill="#7a0000">Keyboard shortcut</text>

  <rect x="20" y="128" width="110" height="34" rx="5" fill="#fde8e8" stroke="#c0392b" stroke-width="1.5"/>
  <text x="75" y="150" text-anchor="middle" fill="#7a0000">API endpoint</text>

  <rect x="20" y="174" width="110" height="34" rx="5" fill="#fde8e8" stroke="#c0392b" stroke-width="1.5"/>
  <text x="75" y="196" text-anchor="middle" fill="#7a0000">Macro runner</text>

  <!-- Document -->
  <rect x="210" y="82" width="130" height="80" rx="5" fill="#fff0f0" stroke="#c0392b" stroke-width="1.5"/>
  <text x="275" y="106" text-anchor="middle" font-weight="bold" fill="#7a0000">Document</text>
  <line x1="210" y1="113" x2="340" y2="113" stroke="#c0392b" stroke-width="1"/>
  <text x="275" y="129" text-anchor="middle" fill="#555" font-size="11">insert(text, pos)</text>
  <text x="275" y="145" text-anchor="middle" fill="#555" font-size="11">delete(pos, len)</text>
  <text x="275" y="155" text-anchor="middle" fill="#c0392b" font-size="10">← all callers know this API</text>

  <!-- Arrows — many direct dependencies -->
  <line x1="130" y1="53" x2="208" y2="105" stroke="#c0392b" stroke-width="1.3" marker-end="url(#arr-red)"/>
  <line x1="130" y1="99" x2="208" y2="115" stroke="#c0392b" stroke-width="1.3" marker-end="url(#arr-red)"/>
  <line x1="130" y1="145" x2="208" y2="130" stroke="#c0392b" stroke-width="1.3" marker-end="url(#arr-red)"/>
  <line x1="130" y1="191" x2="208" y2="150" stroke="#c0392b" stroke-width="1.3" marker-end="url(#arr-red)"/>

  <!-- Pain label -->
  <rect x="20" y="228" width="320" height="60" rx="5" fill="#fff5f5" stroke="#f5c6c6" stroke-width="1"/>
  <text x="180" y="248" text-anchor="middle" fill="#c0392b" font-size="11" font-weight="bold">Problems</text>
  <text x="35" y="264" fill="#555" font-size="11">• 4 callers duplicate insert/delete logic</text>
  <text x="35" y="279" fill="#555" font-size="11">• Adding "replace" → touch all 4 callers</text>
  <text x="35" y="294" fill="#555" font-size="11">• No history, no undo, no audit log possible</text>

  <!-- Divider -->
  <line x1="380" y1="10" x2="380" y2="300" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ══ RIGHT SIDE: WITH COMMAND ══ -->
  <text x="570" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">With Command  ✓</text>

  <!-- Callers (same) -->
  <rect x="395" y="36" width="110" height="34" rx="5" fill="#e8f4fd" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="450" y="58" text-anchor="middle" fill="#1a3a5c">Toolbar button</text>

  <rect x="395" y="82" width="110" height="34" rx="5" fill="#e8f4fd" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="450" y="104" text-anchor="middle" fill="#1a3a5c">Keyboard shortcut</text>

  <rect x="395" y="128" width="110" height="34" rx="5" fill="#e8f4fd" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="450" y="150" text-anchor="middle" fill="#1a3a5c">API endpoint</text>

  <rect x="395" y="174" width="110" height="34" rx="5" fill="#e8f4fd" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="450" y="196" text-anchor="middle" fill="#1a3a5c">Macro runner</text>

  <!-- Invoker / Command interface -->
  <rect x="525" y="82" width="90" height="80" rx="5" fill="#fffbe6" stroke="#d4a017" stroke-width="1.5"/>
  <text x="570" y="106" text-anchor="middle" font-weight="bold" fill="#3a2800">Command</text>
  <line x1="525" y1="113" x2="615" y2="113" stroke="#d4a017" stroke-width="1"/>
  <text x="570" y="129" text-anchor="middle" fill="#555" font-size="11">execute()</text>
  <text x="570" y="145" text-anchor="middle" fill="#555" font-size="11">undo()</text>
  <text x="570" y="158" text-anchor="middle" fill="#888" font-size="10">«interface»</text>

  <!-- Receiver -->
  <rect x="640" y="100" width="105" height="60" rx="5" fill="#f3e8fd" stroke="#8b5bd5" stroke-width="1.5"/>
  <text x="692" y="124" text-anchor="middle" font-weight="bold" fill="#2a0060">Document</text>
  <line x1="640" y1="131" x2="745" y2="131" stroke="#8b5bd5" stroke-width="1"/>
  <text x="692" y="147" text-anchor="middle" fill="#555" font-size="10">insert / delete</text>

  <!-- Callers → Command interface (all same single arrow) -->
  <line x1="505" y1="53" x2="523" y2="113" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="505" y1="99" x2="523" y2="118" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="505" y1="145" x2="523" y2="135" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="505" y1="191" x2="523" y2="151" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Command → Receiver -->
  <line x1="615" y1="122" x2="638" y2="122" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="626" y="116" text-anchor="middle" fill="#888" font-size="9">uses</text>

  <!-- New ReplaceCommand (highlight adding without touching) -->
  <rect x="525" y="185" width="90" height="34" rx="5" fill="#eef6ee" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="570" y="203" text-anchor="middle" fill="#1a3a1a" font-size="11">Replace</text>
  <text x="570" y="216" text-anchor="middle" fill="#27ae60" font-size="9">← new, nothing changes</text>
  <line x1="570" y1="185" x2="570" y2="164" stroke="#27ae60" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-green)"/>

  <!-- Gains label -->
  <rect x="395" y="228" width="350" height="60" rx="5" fill="#f0fff4" stroke="#a8e6ba" stroke-width="1"/>
  <text x="570" y="248" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">Gains</text>
  <text x="410" y="264" fill="#555" font-size="11">• All callers depend on one interface only</text>
  <text x="410" y="279" fill="#555" font-size="11">• New command = new class, zero existing changes</text>
  <text x="410" y="294" fill="#555" font-size="11">• History, undo, audit come for free</text>
</svg>
