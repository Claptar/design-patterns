<svg viewBox="0 0 720 160" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="13">

  <!-- Background -->
  <rect width="720" height="160" fill="#0f1117"/>

  <!-- Request label -->
  <text x="30" y="88" fill="#6b7280" font-size="11" text-anchor="middle">Request</text>
  <line x1="30" y1="92" x2="30" y2="104" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="30" y1="104" x2="60" y2="104" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="58,100 66,104 58,108" fill="#6b7280"/>

  <!-- Handler A -->
  <rect x="68" y="82" width="120" height="44" rx="6" fill="#1e2330" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="128" y="99" fill="#93c5fd" font-size="11" text-anchor="middle">Handler A</text>
  <text x="128" y="116" fill="#6b7280" font-size="10" text-anchor="middle">passes along</text>

  <!-- Arrow A → B -->
  <line x1="188" y1="104" x2="218" y2="104" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="216,100 224,104 216,108" fill="#4b5563"/>

  <!-- Handler B -->
  <rect x="226" y="82" width="120" height="44" rx="6" fill="#1e2330" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="286" y="99" fill="#93c5fd" font-size="11" text-anchor="middle">Handler B</text>
  <text x="286" y="116" fill="#6b7280" font-size="10" text-anchor="middle">passes along</text>

  <!-- Arrow B → C -->
  <line x1="346" y1="104" x2="376" y2="104" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="374,100 382,104 374,108" fill="#4b5563"/>

  <!-- Handler C -->
  <rect x="384" y="82" width="120" height="44" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="444" y="99" fill="#86efac" font-size="11" text-anchor="middle">Handler C</text>
  <text x="444" y="116" fill="#6b7280" font-size="10" text-anchor="middle">handles it ✓</text>

  <!-- Handler D (dimmed) -->
  <rect x="542" y="82" width="120" height="44" rx="6" fill="#161616" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="602" y="99" fill="#374151" font-size="11" text-anchor="middle">Handler D</text>
  <text x="602" y="116" fill="#374151" font-size="10" text-anchor="middle">never reached</text>

  <!-- Dashed arrow C → D -->
  <line x1="504" y1="104" x2="534" y2="104" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="532,100 540,104 532,108" fill="#374151"/>

  <!-- Short-circuit arrow from C downward -->
  <line x1="444" y1="126" x2="444" y2="148" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="440,146 444,154 448,146" fill="#22c55e"/>
  <text x="444" y="158" fill="#22c55e" font-size="10" text-anchor="middle">Response</text>

</svg>
