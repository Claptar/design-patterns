<svg viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">

  <rect width="680" height="340" fill="#0f1117"/>

  <!-- Handler (abstract) -->
  <rect x="240" y="20" width="200" height="90" rx="6" fill="#1e2330" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="240" y="20" width="200" height="28" rx="6" fill="#1a2540"/>
  <rect x="240" y="44" width="200" height="4" fill="#1a2540"/>
  <text x="340" y="38" fill="#93c5fd" font-size="12" text-anchor="middle" font-style="italic">«abstract» Handler</text>
  <line x1="240" y1="48" x2="440" y2="48" stroke="#3b82f6" stroke-width="1"/>
  <text x="252" y="64" fill="#6b7280" font-size="11">- _next: Handler | None</text>
  <line x1="240" y1="70" x2="440" y2="70" stroke="#3b82f6" stroke-width="1"/>
  <text x="252" y="84" fill="#94a3b8" font-size="11">+ set_next(h): Handler</text>
  <text x="252" y="100" fill="#94a3b8" font-size="11">+ handle(req): Response</text>

  <!-- self-reference loop for _next -->
  <path d="M440,55 Q510,55 510,80 Q510,105 440,105" fill="none" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="5 3"/>
  <polygon points="442,101 434,105 442,109" fill="#4b5563"/>
  <text x="515" y="84" fill="#4b5563" font-size="10">_next</text>

  <!-- Inheritance arrows (hollow triangle up) -->
  <!-- Left child -->
  <line x1="180" y1="200" x2="300" y2="110" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="296,108 308,108 302,116" fill="none" stroke="#6b7280" stroke-width="1.5"/>

  <!-- Middle child -->
  <line x1="340" y1="200" x2="340" y2="110" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="336,108 348,108 342,116" fill="none" stroke="#6b7280" stroke-width="1.5"/>

  <!-- Right child -->
  <line x1="510" y1="200" x2="380" y2="110" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="376,108 388,108 382,116" fill="none" stroke="#6b7280" stroke-width="1.5"/>

  <!-- ConcreteHandler A -->
  <rect x="80" y="200" width="200" height="80" rx="6" fill="#1e2330" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="80" y="200" width="200" height="28" rx="6" fill="#1e1a30"/>
  <rect x="80" y="224" width="200" height="4" fill="#1e1a30"/>
  <text x="180" y="218" fill="#c4b5fd" font-size="12" text-anchor="middle">ConcreteHandler A</text>
  <line x1="80" y1="228" x2="280" y2="228" stroke="#8b5cf6" stroke-width="1"/>
  <text x="92" y="248" fill="#94a3b8" font-size="11">+ handle(req): Response</text>
  <text x="92" y="264" fill="#6b7280" font-size="11">  # checks condition A</text>
  <text x="92" y="270" fill="#6b7280" font-size="11">  # stops or passes on</text>

  <!-- ConcreteHandler B -->
  <rect x="240" y="200" width="200" height="80" rx="6" fill="#1e2330" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="240" y="200" width="200" height="28" rx="6" fill="#1e1a30"/>
  <rect x="240" y="224" width="200" height="4" fill="#1e1a30"/>
  <text x="340" y="218" fill="#c4b5fd" font-size="12" text-anchor="middle">ConcreteHandler B</text>
  <line x1="240" y1="228" x2="440" y2="228" stroke="#8b5cf6" stroke-width="1"/>
  <text x="252" y="248" fill="#94a3b8" font-size="11">+ handle(req): Response</text>
  <text x="252" y="264" fill="#6b7280" font-size="11">  # checks condition B</text>
  <text x="252" y="270" fill="#6b7280" font-size="11">  # stops or passes on</text>

  <!-- ConcreteHandler C -->
  <rect x="400" y="200" width="200" height="80" rx="6" fill="#1e2330" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="400" y="200" width="200" height="28" rx="6" fill="#1e1a30"/>
  <rect x="400" y="224" width="200" height="4" fill="#1e1a30"/>
  <text x="500" y="218" fill="#c4b5fd" font-size="12" text-anchor="middle">ConcreteHandler C</text>
  <line x1="400" y1="228" x2="600" y2="228" stroke="#8b5cf6" stroke-width="1"/>
  <text x="412" y="248" fill="#94a3b8" font-size="11">+ handle(req): Response</text>
  <text x="412" y="264" fill="#6b7280" font-size="11">  # checks condition C</text>
  <text x="412" y="270" fill="#6b7280" font-size="11">  # stops or passes on</text>

  <!-- Client box -->
  <rect x="20" y="20" width="120" height="50" rx="6" fill="#1e2330" stroke="#374151" stroke-width="1.5"/>
  <text x="80" y="42" fill="#9ca3af" font-size="12" text-anchor="middle">Client</text>
  <line x1="20" y1="48" x2="140" y2="48" stroke="#374151" stroke-width="1"/>
  <text x="80" y="62" fill="#6b7280" font-size="10" text-anchor="middle">sends request</text>

  <!-- Client → Handler arrow -->
  <line x1="140" y1="45" x2="238" y2="45" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="236,41 244,45 236,49" fill="#4b5563"/>

  <!-- Legend -->
  <line x1="30" y1="305" x2="60" y2="305" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="56,301 64,305 56,309" fill="none" stroke="#6b7280" stroke-width="1.5"/>
  <text x="70" y="309" fill="#6b7280" font-size="10">inherits</text>

  <line x1="150" y1="305" x2="180" y2="305" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="178,301 186,305 178,309" fill="#4b5563"/>
  <text x="192" y="309" fill="#6b7280" font-size="10">uses / calls</text>

  <line x1="280" y1="305" x2="310" y2="305" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="316" y="309" fill="#6b7280" font-size="10">optional reference (_next)</text>

</svg>
