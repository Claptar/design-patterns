<svg viewBox="0 0 720 230" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">

  <rect width="720" height="230" fill="#0f1117"/>

  <!-- Title row -->
  <text x="360" y="22" fill="#6b7280" font-size="11" text-anchor="middle">Query object travels through every handler — all modify, none stop the chain</text>

  <!-- Asker -->
  <rect x="20" y="38" width="90" height="48" rx="6" fill="#1e2330" stroke="#6b7280" stroke-width="1.5"/>
  <text x="65" y="58" fill="#9ca3af" font-size="11" text-anchor="middle">Character</text>
  <text x="65" y="75" fill="#6b7280" font-size="10" text-anchor="middle">get_attack()</text>

  <!-- Arrow to broker -->
  <line x1="110" y1="62" x2="148" y2="62" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="146,58 154,62 146,66" fill="#4b5563"/>
  <text x="129" y="55" fill="#4b5563" font-size="9" text-anchor="middle">Query(10)</text>

  <!-- Broker box -->
  <rect x="154" y="38" width="80" height="48" rx="6" fill="#1e1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="194" y="58" fill="#c4b5fd" font-size="11" text-anchor="middle">Broker</text>
  <text x="194" y="75" fill="#6b7280" font-size="10" text-anchor="middle">publish(q)</text>

  <!-- Broker delivers to each handler -->
  <!-- Handler A -->
  <line x1="234" y1="62" x2="272" y2="62" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="270,58 278,62 270,66" fill="#4b5563"/>

  <rect x="278" y="38" width="110" height="48" rx="6" fill="#0f2010" stroke="#22c55e" stroke-width="1.5"/>
  <text x="333" y="56" fill="#86efac" font-size="11" text-anchor="middle">SwordModifier</text>
  <text x="333" y="72" fill="#4ade80" font-size="10" text-anchor="middle">value += 10  → 20</text>

  <!-- Handler B -->
  <line x1="388" y1="62" x2="418" y2="62" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="416,58 424,62 416,66" fill="#4b5563"/>

  <rect x="424" y="38" width="120" height="48" rx="6" fill="#0f2010" stroke="#22c55e" stroke-width="1.5"/>
  <text x="484" y="56" fill="#86efac" font-size="11" text-anchor="middle">BerserkModifier</text>
  <text x="484" y="72" fill="#4ade80" font-size="10" text-anchor="middle">value *= 2   → 40</text>

  <!-- Handler C (conditional) -->
  <line x1="544" y1="62" x2="574" y2="62" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="572,58 580,62 572,66" fill="#4b5563"/>

  <rect x="580" y="38" width="120" height="48" rx="6" fill="#1a1f0f" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="640" y="56" fill="#6b7280" font-size="11" text-anchor="middle">RingModifier</text>
  <text x="640" y="72" fill="#4b5563" font-size="10" text-anchor="middle">not active → skip</text>

  <!-- Return arrow back to character -->
  <line x1="194" y1="86" x2="194" y2="140" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="194" y1="140" x2="65" y2="140" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="65" y1="140" x2="65" y2="118" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="61,120 65,112 69,120" fill="#8b5cf6"/>
  <text x="129" y="158" fill="#8b5cf6" font-size="10" text-anchor="middle">query.value = 40</text>
  <text x="129" y="170" fill="#6b7280" font-size="9" text-anchor="middle">character reads result back</text>

  <!-- Contrast with method chain -->
  <rect x="20" y="188" width="680" height="32" rx="4" fill="#161a1f"/>
  <text x="360" y="203" fill="#4b5563" font-size="10" text-anchor="middle">Method chain: first handler to claim it stops the rest   |   Broker chain: every handler runs, result accumulates</text>
  <text x="360" y="215" fill="#374151" font-size="9" text-anchor="middle">↑ this is the key structural difference</text>

</svg>
