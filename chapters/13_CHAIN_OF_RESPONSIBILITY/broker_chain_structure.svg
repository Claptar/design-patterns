<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">

  <rect width="680" height="320" fill="#0f1117"/>

  <!-- ── BROKER (centre top) ── -->
  <rect x="240" y="20" width="200" height="90" rx="6" fill="#1e1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="240" y="20" width="200" height="28" rx="6" fill="#281f42"/>
  <rect x="240" y="44" width="200" height="4" fill="#281f42"/>
  <text x="340" y="38" fill="#c4b5fd" font-size="12" text-anchor="middle">StatBroker</text>
  <line x1="240" y1="48" x2="440" y2="48" stroke="#8b5cf6" stroke-width="1"/>
  <text x="252" y="64" fill="#6b7280" font-size="11">- _handlers: list</text>
  <line x1="240" y1="70" x2="440" y2="70" stroke="#8b5cf6" stroke-width="1"/>
  <text x="252" y="84" fill="#94a3b8" font-size="11">+ subscribe(handler)</text>
  <text x="252" y="100" fill="#94a3b8" font-size="11">+ unsubscribe(handler)</text>

  <!-- ── CHARACTER (left) ── -->
  <rect x="30" y="20" width="180" height="90" rx="6" fill="#1e2330" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="30" y="20" width="180" height="28" rx="6" fill="#1a2540"/>
  <rect x="30" y="44" width="180" height="4" fill="#1a2540"/>
  <text x="120" y="38" fill="#93c5fd" font-size="12" text-anchor="middle">Character</text>
  <line x1="30" y1="48" x2="210" y2="48" stroke="#3b82f6" stroke-width="1"/>
  <text x="42" y="64" fill="#6b7280" font-size="11">- base_attack: int</text>
  <text x="42" y="78" fill="#6b7280" font-size="11">- broker: StatBroker</text>
  <line x1="30" y1="82" x2="210" y2="82" stroke="#3b82f6" stroke-width="1"/>
  <text x="42" y="98" fill="#94a3b8" font-size="11">+ get_attack() → int</text>

  <!-- Character → Broker (uses) -->
  <line x1="210" y1="55" x2="238" y2="55" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="236,51 244,55 236,59" fill="#4b5563"/>
  <text x="224" y="48" fill="#4b5563" font-size="9" text-anchor="middle">publish</text>

  <!-- ── MODIFIER BASE (right) ── -->
  <rect x="470" y="20" width="185" height="90" rx="6" fill="#1e2330" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="470" y="20" width="185" height="28" rx="6" fill="#2a2010"/>
  <rect x="470" y="44" width="185" height="4" fill="#2a2010"/>
  <text x="562" y="38" fill="#fcd34d" font-size="12" text-anchor="middle" font-style="italic">«abstract» Modifier</text>
  <line x1="470" y1="48" x2="655" y2="48" stroke="#f59e0b" stroke-width="1"/>
  <text x="482" y="64" fill="#6b7280" font-size="11">- _broker: StatBroker</text>
  <line x1="470" y1="70" x2="655" y2="70" stroke="#f59e0b" stroke-width="1"/>
  <text x="482" y="84" fill="#94a3b8" font-size="11">+ remove() → None</text>
  <text x="482" y="100" fill="#6b7280" font-size="11">~ _handle(query)</text>

  <!-- Modifier → Broker (subscribe) -->
  <line x1="470" y1="55" x2="442" y2="55" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="444,51 436,55 444,59" fill="#4b5563"/>
  <text x="456" y="48" fill="#4b5563" font-size="9" text-anchor="middle">subscribe</text>

  <!-- ── QUERY (bottom centre) ── -->
  <rect x="240" y="148" width="200" height="78" rx="6" fill="#1a1410" stroke="#f97316" stroke-width="1.5"/>
  <rect x="240" y="148" width="200" height="28" rx="6" fill="#261a10"/>
  <rect x="240" y="172" width="200" height="4" fill="#261a10"/>
  <text x="340" y="166" fill="#fdba74" font-size="12" text-anchor="middle">StatQuery</text>
  <line x1="240" y1="176" x2="440" y2="176" stroke="#f97316" stroke-width="1"/>
  <text x="252" y="192" fill="#6b7280" font-size="11">+ source_name: str</text>
  <text x="252" y="206" fill="#6b7280" font-size="11">+ stat_type: StatType</text>
  <text x="252" y="220" fill="#f97316" font-size="11">+ value: int  ← modified</text>

  <!-- Character creates Query -->
  <line x1="120" y1="110" x2="120" y2="187" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="120" y1="187" x2="238" y2="187" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="236,183 244,187 236,191" fill="#3b82f6"/>
  <text x="80" y="160" fill="#3b82f6" font-size="9">creates</text>

  <!-- Broker delivers Query to modifiers -->
  <line x1="340" y1="110" x2="340" y2="146" stroke="#8b5cf6" stroke-width="1.5"/>
  <polygon points="336,144 340,152 344,144" fill="#8b5cf6"/>
  <text x="356" y="134" fill="#8b5cf6" font-size="9">delivers</text>

  <!-- Concrete modifiers row -->
  <rect x="30" y="262" width="145" height="44" rx="6" fill="#0f2010" stroke="#22c55e" stroke-width="1.5"/>
  <text x="102" y="280" fill="#86efac" font-size="11" text-anchor="middle">SwordModifier</text>
  <text x="102" y="296" fill="#4ade80" font-size="10" text-anchor="middle">value += 10</text>

  <rect x="192" y="262" width="145" height="44" rx="6" fill="#0f2010" stroke="#22c55e" stroke-width="1.5"/>
  <text x="264" y="280" fill="#86efac" font-size="11" text-anchor="middle">BerserkModifier</text>
  <text x="264" y="296" fill="#4ade80" font-size="10" text-anchor="middle">value *= 2</text>

  <rect x="354" y="262" width="145" height="44" rx="6" fill="#0f2010" stroke="#22c55e" stroke-width="1.5"/>
  <text x="426" y="280" fill="#86efac" font-size="11" text-anchor="middle">ShieldModifier</text>
  <text x="426" y="296" fill="#4ade80" font-size="10" text-anchor="middle">value += 5</text>

  <rect x="516" y="262" width="148" height="44" rx="6" fill="#0f2010" stroke="#22c55e" stroke-width="1.5"/>
  <text x="590" y="280" fill="#86efac" font-size="11" text-anchor="middle">LastStandModifier</text>
  <text x="590" y="296" fill="#4ade80" font-size="10" text-anchor="middle">value *= 3 if low hp</text>

  <!-- Inheritance lines from concrete to Modifier base -->
  <line x1="102" y1="262" x2="520" y2="110" stroke="#6b7280" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="264" y1="262" x2="535" y2="110" stroke="#6b7280" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="426" y1="262" x2="555" y2="110" stroke="#6b7280" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="590" y1="262" x2="590" y2="112" stroke="#6b7280" stroke-width="1" stroke-dasharray="3 3"/>
  <polygon points="516,110 528,110 522,118" fill="none" stroke="#6b7280" stroke-width="1"/>
  <polygon points="531,110 543,110 537,118" fill="none" stroke="#6b7280" stroke-width="1"/>
  <polygon points="551,110 563,110 557,118" fill="none" stroke="#6b7280" stroke-width="1"/>
  <polygon points="586,110 598,110 592,118" fill="none" stroke="#6b7280" stroke-width="1"/>

</svg>
