<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">

  <rect width="680" height="300" fill="#0f1117"/>

  <!-- BEFORE label -->
  <text x="160" y="22" fill="#f87171" font-size="12" text-anchor="middle" font-weight="bold">Before CQS</text>

  <!-- get_total box - bad -->
  <rect x="30" y="32" width="260" height="84" rx="6" fill="#2a1414" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="30" y="32" width="260" height="24" rx="6" fill="#3a1a1a"/>
  <rect x="30" y="52" width="260" height="4" fill="#3a1a1a"/>
  <text x="160" y="48" fill="#fca5a5" font-size="11" text-anchor="middle">get_total(self) → float</text>
  <text x="46" y="70" fill="#9ca3af" font-size="10">total = sum(item.price ...)</text>
  <text x="46" y="84" fill="#f87171" font-size="10">self._last_calculated = now()  ← side effect!</text>
  <text x="46" y="98" fill="#9ca3af" font-size="10">return total</text>

  <!-- checkout box - bad -->
  <rect x="30" y="128" width="260" height="84" rx="6" fill="#2a1414" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="30" y="128" width="260" height="24" rx="6" fill="#3a1a1a"/>
  <rect x="30" y="148" width="260" height="4" fill="#3a1a1a"/>
  <text x="160" y="144" fill="#fca5a5" font-size="11" text-anchor="middle">checkout(self) → bool</text>
  <text x="46" y="166" fill="#f87171" font-size="10">if not self._items: return False  ← query result</text>
  <text x="46" y="180" fill="#9ca3af" font-size="10">self._status = "checked_out"</text>
  <text x="46" y="194" fill="#9ca3af" font-size="10">return True                       ← command result</text>

  <!-- Arrow -->
  <line x1="310" y1="150" x2="348" y2="150" stroke="#4b5563" stroke-width="2"/>
  <polygon points="346,146 354,150 346,154" fill="#4b5563"/>
  <text x="330" y="144" fill="#6b7280" font-size="10" text-anchor="middle">split</text>

  <!-- AFTER label -->
  <text x="520" y="22" fill="#4ade80" font-size="12" text-anchor="middle" font-weight="bold">After CQS</text>

  <!-- total() query box - good -->
  <rect x="358" y="32" width="290" height="56" rx="6" fill="#0f2010" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="358" y="32" width="290" height="24" rx="6" fill="#142a16"/>
  <rect x="358" y="52" width="290" height="4" fill="#142a16"/>
  <text x="503" y="48" fill="#86efac" font-size="11" text-anchor="middle">total(self) → float  ← query</text>
  <text x="374" y="70" fill="#9ca3af" font-size="10">return sum(item.price ...)  # pure, no side effects</text>

  <!-- checkout() command box - good -->
  <rect x="358" y="100" width="290" height="56" rx="6" fill="#0f2010" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="358" y="100" width="290" height="24" rx="6" fill="#142a16"/>
  <rect x="358" y="120" width="290" height="4" fill="#142a16"/>
  <text x="503" y="116" fill="#86efac" font-size="11" text-anchor="middle">checkout(self) → None  ← command</text>
  <text x="374" y="138" fill="#9ca3af" font-size="10">self._status = "checked_out"  # does, not reports</text>

  <!-- is_empty() query box -->
  <rect x="358" y="168" width="290" height="40" rx="6" fill="#0f2010" stroke="#22c55e" stroke-width="1.5"/>
  <text x="503" y="183" fill="#86efac" font-size="11" text-anchor="middle">is_empty(self) → bool  ← query</text>
  <text x="374" y="198" fill="#9ca3af" font-size="10">return len(self._items) == 0</text>

  <!-- Bottom separator -->
  <line x1="30" y1="228" x2="650" y2="228" stroke="#1f2937" stroke-width="1"/>

  <!-- Legend row -->
  <rect x="30" y="242" width="14" height="14" rx="3" fill="#2a1414" stroke="#ef4444" stroke-width="1.5"/>
  <text x="52" y="253" fill="#6b7280" font-size="11">returns value AND has side effect  →  smell</text>

  <rect x="358" y="242" width="14" height="14" rx="3" fill="#0f2010" stroke="#22c55e" stroke-width="1.5"/>
  <text x="380" y="253" fill="#6b7280" font-size="11">one job only  →  clean</text>

  <!-- Rule reminder -->
  <text x="340" y="285" fill="#374151" font-size="10" text-anchor="middle">Query: return value, no state change   |   Command: state change, return None</text>

</svg>
