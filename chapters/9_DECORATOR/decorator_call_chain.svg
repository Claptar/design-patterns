<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Decorator call chain</title>
  <desc>Diagram showing how a method call passes through each decorator layer inward to the real object, then results flow back outward</desc>

  <defs>
    <marker id="arrow-right" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-left" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Labels: top row (call direction) -->
  <text x="340" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Call flows inward →</text>

  <!-- Layer boxes -->
  <!-- Caller -->
  <rect x="20" y="50" width="100" height="200" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="70" y="145" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A" transform="rotate(-90,70,145)">Caller</text>

  <!-- EncryptionDecorator -->
  <rect x="140" y="50" width="120" height="200" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="200" y="130" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#712B13">Encryption</text>
  <text x="200" y="147" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#993C1D">Decorator</text>
  <text x="200" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#993C1D">adds step 3</text>

  <!-- CompressionDecorator -->
  <rect x="280" y="50" width="120" height="200" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="130" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#712B13">Compression</text>
  <text x="340" y="147" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#993C1D">Decorator</text>
  <text x="340" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#993C1D">adds step 2</text>

  <!-- LoggingDecorator -->
  <rect x="420" y="50" width="120" height="200" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="480" y="130" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#712B13">Logging</text>
  <text x="480" y="147" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#993C1D">Decorator</text>
  <text x="480" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#993C1D">adds step 1</text>

  <!-- Real object -->
  <rect x="560" y="50" width="100" height="200" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="610" y="155" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#085041" transform="rotate(-90,610,155)">Real object</text>

  <!-- Call arrows (going right, upper half) -->
  <line x1="120" y1="120" x2="138" y2="120" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="260" y1="120" x2="278" y2="120" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="400" y1="120" x2="418" y2="120" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="540" y1="120" x2="558" y2="120" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <!-- Return arrows (going left, lower half) -->
  <line x1="558" y1="185" x2="542" y2="185" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-left)"/>
  <line x1="418" y1="185" x2="402" y2="185" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-left)"/>
  <line x1="278" y1="185" x2="262" y2="185" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-left)"/>
  <line x1="138" y1="185" x2="122" y2="185" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-left)"/>

  <!-- Labels: bottom row (return direction) -->
  <text x="340" y="290" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">← Result flows outward</text>

  <!-- Call label -->
  <text x="340" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#D85A30">export(data)</text>

  <!-- Return label -->
  <text x="340" y="207" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">result</text>
</svg>
