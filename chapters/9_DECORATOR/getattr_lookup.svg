<svg width="680" height="300" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Python attribute lookup sequence</title>
  <desc>Flowchart showing how Python resolves attribute access: instance dict, class MRO, then __getattr__ as last resort</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">decorator.something — Python attribute lookup sequence</text>

  <!-- Step 1: instance dict -->
  <rect x="40" y="50" width="170" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="125" y="73" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#3C3489">1. Instance dict</text>
  <text x="125" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">decorator.__dict__</text>

  <!-- Arrow step 1 -> step 2 -->
  <line x1="210" y1="78" x2="248" y2="78" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="229" y="70" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888780">not found</text>

  <!-- Step 2: class MRO -->
  <rect x="250" y="50" width="170" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="335" y="73" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#3C3489">2. Class hierarchy</text>
  <text x="335" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">MRO — class + bases</text>

  <!-- Arrow step 2 -> step 3 -->
  <line x1="420" y1="78" x2="458" y2="78" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="439" y="70" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888780">not found</text>

  <!-- Step 3: __getattr__ -->
  <rect x="460" y="50" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="550" y="73" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#712B13">3. __getattr__</text>
  <text x="550" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#993C1D">last resort fallback</text>

  <!-- Found at step 1 -->
  <line x1="125" y1="106" x2="125" y2="148" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="60" y="150" width="130" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="125" y="174" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#085041">decorator's own attr</text>

  <!-- Found at step 2 -->
  <line x1="335" y1="106" x2="335" y2="148" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="258" y="150" width="154" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="335" y="174" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#085041">declared method / prop</text>

  <!-- __getattr__ forwards to wrapped -->
  <line x1="550" y1="106" x2="550" y2="148" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow-coral)"/>
  <rect x="460" y="150" width="180" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="550" y="174" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#712B13">getattr(self._wrapped, name)</text>

  <!-- Arrow from __getattr__ result to wrapped object -->
  <line x1="550" y1="190" x2="550" y2="228" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow-coral)"/>
  <rect x="460" y="230" width="180" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="550" y="254" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#085041">wrapped object's method</text>

  <!-- Key label -->
  <text x="340" y="285" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5F5E5A">__getattr__ only fires when steps 1 and 2 both fail — the decorator's own methods are never intercepted</text>
</svg>
