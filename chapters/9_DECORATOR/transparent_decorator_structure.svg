<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Transparent decorator structure</title>
  <desc>Two-panel diagram comparing standard decorator (type erosion) with transparent decorator (getattr forwarding)</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── LEFT PANEL: Standard Decorator (type erosion) ── -->
  <text x="160" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Standard decorator</text>
  <text x="160" y="44" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#993C1D">type erosion</text>

  <!-- Caller -->
  <rect x="20" y="60" width="90" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="65" y="86" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Caller</text>

  <!-- Arrow caller -> decorator -->
  <line x1="110" y1="82" x2="128" y2="82" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LoggingDecorator box -->
  <rect x="130" y="60" width="120" height="120" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="190" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#712B13">LoggingDecorator</text>
  <!-- declared methods -->
  <text x="145" y="102" font-family="monospace" font-size="11" fill="#993C1D">✓ write()</text>
  <!-- missing methods -->
  <text x="145" y="120" font-family="monospace" font-size="11" fill="#C04828">✗ set_encoding()</text>
  <text x="145" y="137" font-family="monospace" font-size="11" fill="#C04828">✗ get_page_count()</text>
  <text x="145" y="154" font-family="monospace" font-size="11" fill="#C04828">✗ flush()</text>

  <!-- Arrow decorator -> real object -->
  <line x1="250" y1="120" x2="268" y2="120" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ReportWriter box -->
  <rect x="270" y="60" width="120" height="120" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="330" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#085041">ReportWriter</text>
  <text x="285" y="102" font-family="monospace" font-size="11" fill="#0F6E56">write()</text>
  <text x="285" y="120" font-family="monospace" font-size="11" fill="#0F6E56">set_encoding()</text>
  <text x="285" y="137" font-family="monospace" font-size="11" fill="#0F6E56">get_page_count()</text>
  <text x="285" y="154" font-family="monospace" font-size="11" fill="#0F6E56">flush()</text>

  <!-- Blocked arrows from caller trying to reach hidden methods -->
  <!-- set_encoding blocked -->
  <line x1="110" y1="200" x2="128" y2="200" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <rect x="130" y="188" width="120" height="24" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="190" y="204" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A32D2D">AttributeError</text>
  <text x="20" y="205" font-family="monospace" font-size="10" fill="#888780">set_encoding()</text>

  <!-- flush blocked -->
  <line x1="110" y1="232" x2="128" y2="232" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <rect x="130" y="220" width="120" height="24" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="190" y="236" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A32D2D">AttributeError</text>
  <text x="20" y="237" font-family="monospace" font-size="10" fill="#888780">flush()</text>

  <!-- ── DIVIDER ── -->
  <line x1="420" y1="50" x2="420" y2="390" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- ── RIGHT PANEL: Transparent Decorator ── -->
  <text x="550" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Transparent decorator</text>
  <text x="550" y="44" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">__getattr__ forwarding</text>

  <!-- Caller -->
  <rect x="430" y="60" width="90" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="475" y="86" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Caller</text>

  <!-- Arrow caller -> decorator -->
  <line x1="520" y1="82" x2="538" y2="82" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LoggingDecorator transparent box -->
  <rect x="540" y="60" width="124" height="120" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="602" y="80" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#712B13">LoggingDecorator</text>
  <text x="555" y="98" font-family="monospace" font-size="11" fill="#993C1D">✓ write()</text>
  <!-- getattr line -->
  <line x1="555" y1="112" x2="655" y2="112" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="555" y="126" font-family="monospace" font-size="10" fill="#5F5E5A">__getattr__</text>
  <text x="555" y="140" font-family="monospace" font-size="10" fill="#5F5E5A">→ forwards</text>
  <text x="555" y="154" font-family="monospace" font-size="10" fill="#5F5E5A">  all else</text>

  <!-- forwarded calls - success arrows going through -->
  <!-- write() -->
  <text x="432" y="205" font-family="monospace" font-size="10" fill="#888780">write()</text>
  <line x1="520" y1="200" x2="538" y2="200" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="664" y1="200" x2="660" y2="200" stroke="#0F6E56" stroke-width="0" />

  <!-- set_encoding() passes through -->
  <text x="432" y="225" font-family="monospace" font-size="10" fill="#888780">set_encoding()</text>
  <line x1="520" y1="220" x2="538" y2="220" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arrow-green)"/>

  <!-- flush() passes through -->
  <text x="432" y="245" font-family="monospace" font-size="10" fill="#888780">flush()</text>
  <line x1="520" y1="240" x2="538" y2="240" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arrow-green)"/>

  <!-- Arrow through decorator to real object -->
  <line x1="540" y1="210" x2="540" y2="290" stroke="#0F6E56" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="540" y1="290" x2="558" y2="290" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ReportWriter box right panel -->
  <rect x="560" y="270" width="104" height="100" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="612" y="290" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#085041">ReportWriter</text>
  <text x="570" y="308" font-family="monospace" font-size="10" fill="#0F6E56">write()</text>
  <text x="570" y="324" font-family="monospace" font-size="10" fill="#0F6E56">set_encoding()</text>
  <text x="570" y="340" font-family="monospace" font-size="10" fill="#0F6E56">get_page_count()</text>
  <text x="570" y="356" font-family="monospace" font-size="10" fill="#0F6E56">flush()</text>

  <!-- Legend -->
  <line x1="40" y1="385" x2="65" y2="385" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-green)"/>
  <text x="72" y="389" font-family="sans-serif" font-size="11" fill="#5F5E5A">forwarded via __getattr__</text>
  <line x1="240" y1="385" x2="265" y2="385" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <text x="272" y="389" font-family="sans-serif" font-size="11" fill="#5F5E5A">blocked (AttributeError)</text>
</svg>
